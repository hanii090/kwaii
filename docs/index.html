<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kawaii Pills</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FFF9F0;
      color: #4A3728;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    .logo { font-size: 64px; margin-bottom: 16px; }
    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #4A3728;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 16px;
      color: #8B7355;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      display: inline-block;
      padding: 12px 24px;
      background: #E8A87C;
      color: #fff;
      text-decoration: none;
      border-radius: 24px;
      font-weight: 600;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(232, 168, 124, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🐱💊</div>
    <h1>Kawaii Pills</h1>
    <p class="tagline">Your adorable pill reminder companion</p>
    <div class="links">
      <a href="privacy">Privacy Policy</a>
      <a href="terms">Terms of Service</a>
    </div>
  </div>
</body>
</html>
